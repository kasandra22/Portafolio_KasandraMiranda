<!-- fragmento 1 para Agregar categoria en ventana modal -->
<section th:fragment="agregar">
    <!-- Button trigger modal -->
    <div class="row py-4 mb-2 bg-light">
        <div class="col-md-1"></div>
        <div class="col-md-3">
            <button type="button" class="btn btn-primary" sec:authorize="hasRole('ROLE_ADMIN')"
                data-bs-toggle="modal" data-bs-target="#agregarCategoriaModal">
                <i class="fa-solid fa-plus"></i> [[#{categoria.agregar}]]
            </button>
        </div>
    </div>
    <!-- Modal -->
    <div class="modal fade" id="agregarCategoriaModal" tabindex="-1"
        aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-info text-white">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">
                        <i class="fa-solid fa-layer-group"></i> [[#{categoria.agregar}]]
                    </h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/categoria/guardar}" th:object="${categoria}"
                    class="was-validated" enctype="multipart/form-data" method="post">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label>[[#{categoria.descripcion}]]</label>
                            <input type="text" name="descripcion" class="form-control" required="true"/>
                        </div>
                        <div class="mb-3">
                            <label>[[#{categoria.activo}]]</label>
                            <input type="checkbox" name="activo" class="form-check-input"/>
                        </div>
                        <div class="mb-3">
                            <label>[[#{categoria.imagen}]]</label>
                            <input type="file" name="imagenFile" onchange="mostrarImagen(this);"
                                class="form-control"/>
                            <img id="blah" src="#" alt="imagen de categoria" height="200"/>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            <i class="fa-solid fa-xmark"></i> [[#{accion.cerrar}]]
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fa-solid fa-floppy-disk"></i> [[#{accion.guardar}]]
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>

<!-- fragmento 2 para el listado de categorias -->
<section th:fragment="listado" class="p-3">
    <div class="row">
        <div class="col-md-9">
            <table class="table table-bordered table-hover">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>[[#{categoria.descripcion}]]</th>
                        <th>[[#{categoria.imagen}]]</th>
                        <th>[[#{categoria.activo}]]</th>
                        <th sec:authorize="hasRole('ROLE_ADMIN')"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="categoria : ${categorias}">
                        <td th:text="${categoria.idCategoria}"></td>
                        <td th:text="${categoria.descripcion}"></td>
                        <td>
                            <img th:src="${categoria.rutaImagen}" height="50" alt="imagen"/>
                        </td>
                        <td th:text="${categoria.activo} ? 'Activa' : 'Inactiva'"></td>
                        <td sec:authorize="hasRole('ROLE_ADMIN')">
                            <button type="button" class="btn btn-danger btn-sm"
                                    data-bs-toggle="modal" data-bs-target="#confirmModal"
                                    th:attr="data-bs-id=${categoria.idCategoria}, data-bs-descripcion=${categoria.descripcion}">
                                <i class="fa-solid fa-trash"></i> [[#{accion.eliminar}]]
                            </button>
                            <a th:href="@{/categoria/modificar/{id}(id=${categoria.idCategoria})}"
                               class="btn btn-warning btn-sm">
                                <i class="fa-solid fa-pen"></i> [[#{accion.actualizar}]]
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-success">
                <div class="card-body text-center">
                    <h5 class="card-title">[[#{categoria.total}]]</h5>
                    <h2>
                        <i class="fa-solid fa-layer-group"></i> [[${totalCategorias}]]
                    </h2>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- 3 Fragmento que se utiliza en la página modifica.html -->
<section th:fragment="editar" class="container mt-4">
    <div class="row mb-3">
        <div class="col-md-6 offset-md-3">
            <a th:href="@{/categoria/listado}" class="btn btn-primary">
                <i class="fa-solid fa-arrow-left"></i> [[#{accion.regresar}]]
            </a>
        </div>
    </div>

    <form th:action="@{/categoria/guardar}" th:object="${categoria}" method="post" enctype="multipart/form-data">

        <input type="hidden" th:field="*{idCategoria}"/>

        <div class="row mb-3">
            <div class="col-md-6 offset-md-3">
                <label>[[#{categoria.descripcion}]]</label>
                <input type="text" th:field="*{descripcion}" class="form-control"/>
                <span th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}" class="text-danger"></span>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6 offset-md-3">
                <div class="form-check">
                    <input type="checkbox" th:field="*{activo}" class="form-check-input"/>
                    <label class="form-check-label">[[#{categoria.activo}]]</label>
                </div>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6 offset-md-3">
                <label>[[#{categoria.imagen}]]</label>
                <input type="file" name="imagenFile" class="form-control" onchange="mostrarImagen(this)"/>
                <img id="blah" th:src="*{rutaImagen}" alt="imagen de categoria" class="mt-2" height="200"/>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 offset-md-3 text-end">
                <button type="submit" class="btn btn-success">
                    <i class="fa-solid fa-floppy-disk"></i> [[#{accion.guardar}]]
                </button>
            </div>
        </div>

    </form>
</section>

<!-- 4 fragmento que se utiliza para confirmar que se desea eliminar una categoria -->
<section th:fragment="confirmarEliminar">
    <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/categoria/eliminar}" method="post">
                    <div class="modal-header bg-warning">
                        <h5 class="modal-title">
                            <i class="fa-solid fa-triangle-exclamation"></i> [[#{accion.confirmarEliminar}]]
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" name="idCategoria" id="modalId"/>
                        <p>[[#{categoria.confirmarMensaje}]] <strong id="modalDescripcion"></strong>?</p>
                        <p class="text-danger">[[#{accion.noReversible}]]</p>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-danger">
                            <i class="fa-solid fa-trash"></i> [[#{accion.eliminar}]]
                        </button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            <i class="fa-solid fa-xmark"></i> [[#{accion.cerrar}]]
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
